services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379
      DATA_DIR: /data/sessions
    env_file:
      - .env
    volumes:
      - ./src:/app/src
      - ./config:/app/config
      - session-data:/data/sessions

volumes:
  redis-data:
  session-data:
