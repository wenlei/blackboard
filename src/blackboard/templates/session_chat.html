<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/static/favicon.ico">
    <link rel="stylesheet" href="/static/css/animal-island.css">
    <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
    <title>Blackboard — Session {{ session_id }}</title>
    <style>
        body { margin: 0; background: var(--animal-bg-color); font-family: var(--animal-font-family); height: 100vh; display: flex; flex-direction: column; }
        .header { background: var(--animal-primary-color); padding: 10px 20px; color: #fff; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; gap: 12px; min-width: 0; }
        .header-left { display: flex; flex-direction: column; justify-content: center; min-width: 0; flex-shrink: 1; overflow: hidden; }
        .header a { color: #fff; text-decoration: none; font-weight: 600; font-size: 12px; opacity: .85; white-space: nowrap; }
        .header h2 { margin: 2px 0 0; font-size: 15px; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .header .actions { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
        .header .actions button { background: rgba(255,255,255,.18); border: 1px solid rgba(255,255,255,.35); color: #fff; padding: 5px 12px; border-radius: 50px; cursor: pointer; font-size: 12px; display: inline-flex; align-items: center; gap: 4px; white-space: nowrap; transition: background .15s; }
        .header .actions button img { width: 14px; height: 14px; filter: brightness(0) invert(1); }
        .header .actions button:hover { background: rgba(255,255,255,.32); }
        .header .actions button.active-btn { background: rgba(255,255,255,.4); }
        .header .actions button.btn-danger { border-color: rgba(255,180,180,.45); }
        .header .actions button.btn-danger:hover { background: rgba(220,60,60,.35); }
        .header-divider { width: 1px; height: 18px; background: rgba(255,255,255,.3); margin: 0 2px; flex-shrink: 0; }
        .layout { display: flex; flex: 1; overflow: hidden; }
        .chat-area { flex: 1; display: flex; flex-direction: column; }
        .messages { flex: 1; overflow-y: auto; padding: 20px; }
        .msg { margin-bottom: 16px; display: flex; flex-direction: column; }
        .msg.user { align-items: flex-end; }
        .msg.host, .msg.system, .msg.agent { align-items: flex-start; }
        .msg .bubble { max-width: 70%; padding: 12px 18px; border-radius: 18px; font-size: 14px; line-height: 1.5; word-break: break-word; }
        .msg.user .bubble { background: var(--animal-primary-color); color: #fff; border-bottom-right-radius: 8px; }
        .msg.host .bubble, .msg.agent .bubble { background: #f7f3df; color: #725d42; border-bottom-left-radius: 8px; }
        .msg.system .bubble { background: #faf8f2; color: #9f927d; font-style: italic; font-size: 13px; text-align: center; max-width: 100%; border: 1px dashed #e8dcc8; }
        .msg .ts { font-size: 11px; color: var(--animal-text-color-secondary); }
        .msg .ts-row { display: flex; align-items: center; gap: 6px; padding: 2px 8px; margin-top: 4px; }
        .msg.user .ts-row { justify-content: flex-end; }
        .msg .sender { font-size: 11px; color: var(--animal-text-color-secondary); margin-bottom: 2px; padding: 0 8px; font-weight: 600; }
        .input-wrapper { display: flex; flex-direction: column; background: #f8f8f0; border-top: 2px solid var(--animal-border-color-light); flex-shrink: 0; position: relative; }
        .agent-chips { display: flex; gap: 6px; flex-wrap: wrap; padding: 8px 20px 0; min-height: 0; }
        .agent-chip { padding: 3px 10px; background: #f0e8d8; border-radius: 50px; font-size: 12px; font-weight: 600; cursor: pointer; color: var(--animal-text-color); border: 1px solid var(--animal-border-color-light); transition: background .15s; user-select: none; }
        .agent-chip:hover { background: #e8dcc8; border-color: var(--animal-border-color); }
        .agent-chip.is-host { background: #f7cd67; border-color: #e6b84a; }
        .input-area { padding: 10px 20px 16px; display: flex; gap: 8px; }
        .input-area input { flex: 1; padding: 10px 16px; border: 2px solid var(--animal-border-color); border-radius: 18px; font-size: 14px; background: #fff; }
        .input-area input:focus { border-color: var(--animal-primary-color); outline: none; }
        .input-area button { background: var(--animal-primary-color); color: #fff; border: none; padding: 10px 24px; border-radius: 50px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        .input-area button img { width: 18px; height: 18px; filter: brightness(0) invert(1); }
        .input-area button:disabled { opacity: 0.5; cursor: not-allowed; }
        #action-btn { border-radius: 50px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 6px; padding: 10px 24px; border: 2px solid transparent; transition: background .15s, color .15s, border-color .15s; }
        #action-btn.send-mode { background: var(--animal-primary-color); color: #fff; }
        #action-btn.stop-mode { background: none; border-color: #e05a5a; color: #e05a5a; }
        #action-btn.stop-mode:hover { background: #fdf0f0; }
        #action-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .copy-btn { opacity: 0.35; background: none; border: none; cursor: pointer; padding: 2px 4px; border-radius: 5px; transition: opacity .15s, background .15s; flex-shrink: 0; line-height: 0; display: flex; align-items: center; }
        .copy-btn img { width: 15px; height: 15px; transition: opacity .15s; }
        .copy-btn:hover { opacity: 0.8; background: var(--animal-border-color-light); }
        .mention-dropdown { position: absolute; bottom: calc(100% - 2px); left: 20px; background: #fff; border: 1px solid var(--animal-border-color); border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,.12); display: none; z-index: 200; min-width: 160px; overflow: hidden; }
        .mention-option { padding: 9px 16px; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 8px; color: var(--animal-text-color); }
        .mention-option:hover, .mention-option.selected { background: #f0e8d8; }
        .mention-option .chip-dot { width: 8px; height: 8px; border-radius: 50%; background: #6fba2c; display: inline-block; flex-shrink: 0; }
        .resize-handle { width: 5px; background: var(--animal-border-color-light); cursor: col-resize; flex-shrink: 0; transition: background .15s; position: relative; z-index: 10; }
        .resize-handle::after { content: ''; position: absolute; top: 0; bottom: 0; left: -4px; right: -4px; }
        .resize-handle:hover, .resize-handle.dragging { background: var(--animal-primary-color); opacity: 0.45; }
        .sidebar { width: 320px; background: #faf8f2; padding: 16px; overflow-y: auto; flex-shrink: 0; }
        .sidebar h3 { font-size: 14px; color: var(--animal-text-color); margin: 0 0 12px; }
        .sidebar .agent-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: #f0e8d8; border-radius: 12px; margin-bottom: 8px; font-size: 13px; cursor: pointer; }
        .sidebar .agent-item:hover { background: #e8dcc8; }
        .sidebar .agent-item .agent-info { display: flex; align-items: center; gap: 6px; }
        .sidebar .agent-item .status { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .status-active { background: #6fba2c; }
        .status-paused { background: #f7cd67; }
        .sidebar .agent-item .del-btn { background: none; border: none; color: #c9a8a8; cursor: pointer; padding: 2px; line-height: 1; display: flex; align-items: center; }
        .sidebar .agent-item .del-btn img { width: 16px; height: 16px; }
        .sidebar .agent-item .del-btn:hover { color: #e05a5a; }
        .sidebar .add-agent-form { margin-top: 12px; padding-top: 12px; border-top: 1px dashed var(--animal-border-color); }
        .sidebar .add-agent-form input, .sidebar .add-agent-form select { width: 100%; padding: 6px 10px; border: 1px solid var(--animal-border-color); border-radius: 10px; font-size: 12px; background: #fff; margin-bottom: 6px; box-sizing: border-box; }
        .sidebar .add-agent-form button { width: 100%; padding: 6px; background: var(--animal-primary-color); color: #fff; border: none; border-radius: 10px; font-size: 12px; font-weight: 600; cursor: pointer; }
        .sidebar .add-agent-form button:hover { opacity: 0.9; }
        .sidebar .strategy-box { background: #f7f3df; border-radius: 12px; padding: 12px; margin-top: 16px; }
        .sidebar .strategy-box pre { font-size: 12px; white-space: pre-wrap; margin: 0; color: #725d42; max-height: 160px; overflow-y: auto; }
        .strategy-select { width: 100%; padding: 6px 10px; border: 1px solid var(--animal-border-color); border-radius: 10px; font-size: 12px; background: #fff; margin-bottom: 8px; box-sizing: border-box; }
        .role-mapping-row { display: flex; gap: 6px; align-items: center; margin-bottom: 6px; }
        .role-mapping-row .role-label { font-size: 11px; color: #725d42; min-width: 70px; font-weight: 600; }
        .role-mapping-row select { flex: 1; padding: 4px 8px; border: 1px solid var(--animal-border-color); border-radius: 8px; font-size: 12px; background: #fff; }
        .apply-strategy-btn { width: 100%; padding: 6px; background: #725d42; color: #fff; border: none; border-radius: 10px; font-size: 12px; font-weight: 600; cursor: pointer; margin-top: 6px; }
        .apply-strategy-btn:hover { opacity: 0.9; }
        .approval-box { background: #f7cd67; border-radius: 12px; padding: 12px; margin-top: 16px; }
        .approval-box button { margin: 4px; padding: 6px 16px; border-radius: 50px; border: none; cursor: pointer; font-weight: 600; font-size: 13px; }
        .approval-box .approve { background: #6fba2c; color: #fff; }
        .approval-box .reject { background: #e05a5a; color: #fff; }
        .toast-container { position: fixed; top: 70px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
        .toast { padding: 10px 20px; border-radius: 18px; font-size: 13px; font-weight: 600; color: #fff; animation: slideIn .3s ease; max-width: 360px; }
        .toast-info { background: #889df0; }
        .toast-error { background: #e05a5a; }
        .toast-success { background: #6fba2c; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        /* ── Agent edit modal ──────────────────────────────────────────── */
        .agent-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.38); z-index: 1000; display: flex; align-items: center; justify-content: center; animation: overlayIn .15s ease; }
        .agent-modal-overlay.hidden { display: none; }
        @keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }
        .agent-modal { background: #fff; border-radius: 22px; width: 500px; max-width: 94vw; max-height: 90vh; display: flex; flex-direction: column; box-shadow: 0 24px 64px rgba(0,0,0,.18), 0 4px 16px rgba(0,0,0,.08); animation: modalUp .2s cubic-bezier(.34,1.26,.64,1); }
        @keyframes modalUp { from { transform: translateY(20px) scale(.97); opacity: 0; } to { transform: none; opacity: 1; } }
        .agent-modal-header { padding: 22px 24px 16px; border-bottom: 1px solid var(--animal-border-color-light); display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
        .agent-avatar { width: 46px; height: 46px; border-radius: 14px; background: var(--animal-primary-color); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 17px; font-weight: 800; letter-spacing: -.5px; flex-shrink: 0; user-select: none; }
        .agent-modal-title { flex: 1; min-width: 0; }
        .agent-modal-title h3 { margin: 0 0 4px; font-size: 17px; color: var(--animal-text-color); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .agent-modal-title .role-badge { display: inline-block; font-size: 11px; background: #f0e8d8; color: #725d42; padding: 2px 9px; border-radius: 50px; font-weight: 600; }
        .modal-close-btn { width: 30px; height: 30px; border-radius: 50%; background: #f0e8d8; border: none; cursor: pointer; font-size: 14px; color: #725d42; display: flex; align-items: center; justify-content: center; transition: background .15s; flex-shrink: 0; }
        .modal-close-btn:hover { background: #e8dcc8; }
        .agent-modal-body { flex: 1; overflow-y: auto; padding: 22px 24px; display: flex; flex-direction: column; gap: 22px; }
        .modal-section { display: flex; flex-direction: column; gap: 10px; }
        .modal-section-title { font-size: 10.5px; font-weight: 700; color: #b0a090; text-transform: uppercase; letter-spacing: .08em; display: flex; justify-content: space-between; align-items: center; }
        .modal-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .modal-field { display: flex; flex-direction: column; gap: 5px; }
        .modal-field label { font-size: 12px; font-weight: 600; color: #725d42; }
        .modal-field input, .modal-field select, .modal-field textarea { padding: 8px 12px; border: 1.5px solid var(--animal-border-color); border-radius: 10px; font-size: 13px; background: #faf8f2; font-family: inherit; box-sizing: border-box; width: 100%; transition: border-color .15s, background .15s; }
        .modal-field input:focus, .modal-field select:focus, .modal-field textarea:focus { outline: none; border-color: var(--animal-primary-color); background: #fff; }
        .modal-field input[readonly] { opacity: .5; cursor: default; background: #f0ece4; }
        .modal-field textarea { resize: vertical; min-height: 120px; line-height: 1.55; }
        .agent-modal-footer { padding: 14px 24px 18px; border-top: 1px solid var(--animal-border-color-light); display: flex; justify-content: flex-end; gap: 8px; flex-shrink: 0; background: #faf8f2; border-radius: 0 0 22px 22px; }
        .modal-btn { padding: 9px 22px; border-radius: 50px; font-weight: 700; font-size: 13px; cursor: pointer; border: none; transition: opacity .15s; }
        .modal-btn:hover { opacity: .86; }
        .modal-btn.primary { background: var(--animal-primary-color); color: #fff; }
        .modal-btn.secondary { background: none; border: 1.5px solid var(--animal-border-color); color: var(--animal-text-color); }
        .thinking { display: flex; align-items: center; gap: 8px; padding: 12px 18px; font-size: 13px; color: var(--animal-text-color-secondary); }
        .thinking .dots span { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--animal-text-color-secondary); margin: 0 2px; animation: blink 1.4s infinite both; }
        .thinking .dots span:nth-child(2) { animation-delay: .2s; }
        .thinking .dots span:nth-child(3) { animation-delay: .4s; }
        @keyframes blink { 0%, 80%, 100% { opacity: 0; } 40% { opacity: 1; } }
        .archived-badge { background: #f7cd67; color: #725d42; padding: 2px 8px; border-radius: 8px; font-size: 11px; font-weight: 600; }
        /* ── Markdown rendering inside host/agent bubbles ──────────── */
        .msg.host .bubble p, .msg.agent .bubble p { margin: 0 0 0.5em; }
        .msg.host .bubble p:last-child, .msg.agent .bubble p:last-child { margin-bottom: 0; }
        .msg.host .bubble h1, .msg.agent .bubble h1 { font-size: 1.2em; font-weight: 700; margin: 0.5em 0 0.3em; line-height: 1.3; }
        .msg.host .bubble h2, .msg.agent .bubble h2 { font-size: 1.08em; font-weight: 700; margin: 0.4em 0 0.25em; line-height: 1.3; }
        .msg.host .bubble h3, .msg.agent .bubble h3 { font-size: 1em; font-weight: 700; margin: 0.35em 0 0.2em; }
        .msg.host .bubble code, .msg.agent .bubble code { background: rgba(0,0,0,.08); padding: 1px 5px; border-radius: 4px; font-family: ui-monospace, 'Cascadia Code', Menlo, monospace; font-size: 0.87em; }
        .msg.host .bubble pre, .msg.agent .bubble pre { background: rgba(0,0,0,.07); border-radius: 8px; padding: 10px 14px; overflow-x: auto; margin: 0.45em 0; }
        .msg.host .bubble pre code, .msg.agent .bubble pre code { background: none; padding: 0; font-size: 0.87em; }
        .msg.host .bubble ul, .msg.agent .bubble ul, .msg.host .bubble ol, .msg.agent .bubble ol { padding-left: 1.35em; margin: 0.35em 0; }
        .msg.host .bubble li, .msg.agent .bubble li { margin: 0.12em 0; }
        .msg.host .bubble blockquote, .msg.agent .bubble blockquote { border-left: 3px solid #c9a87a; margin: 0.4em 0; padding: 2px 0 2px 11px; color: #967a5a; font-style: italic; }
        .msg.host .bubble table, .msg.agent .bubble table { border-collapse: collapse; font-size: 0.88em; margin: 0.45em 0; max-width: 100%; }
        .msg.host .bubble th, .msg.agent .bubble th { background: rgba(0,0,0,.09); padding: 4px 10px; text-align: left; border: 1px solid rgba(0,0,0,.13); font-weight: 700; }
        .msg.host .bubble td, .msg.agent .bubble td { padding: 4px 10px; border: 1px solid rgba(0,0,0,.09); }
        .msg.host .bubble hr, .msg.agent .bubble hr { border: none; border-top: 1px solid rgba(0,0,0,.12); margin: 0.5em 0; }
        .msg.host .bubble a, .msg.agent .bubble a { color: #725d42; text-decoration: underline; }
        .msg.host .bubble strong, .msg.agent .bubble strong { font-weight: 700; }
        .msg.host .bubble em, .msg.agent .bubble em { font-style: italic; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <a href="/" style="display:inline-flex;align-items:center;gap:4px;"><img src="/static/icons/arrow_back.svg" width="14" height="14" style="filter:brightness(0) invert(1);vertical-align:middle;opacity:.85;"> Dashboard</a>
            <h2 id="header-title">Session: {{ session_id }}</h2>
        </div>
        <div class="actions">
            <span id="session-status" style="font-size:11px;opacity:.7;"></span>
            <button id="btn-pause-resume" onclick="togglePauseResume()"><img id="btn-pause-resume-icon" src="/static/icons/pause.svg" alt="pause"> <span id="btn-pause-resume-label">Pause</span></button>
            <button id="btn-execute" onclick="executeStrategy()"><img src="/static/icons/play_arrow.svg" alt="execute"> Execute</button>
            <div class="header-divider"></div>
            <button onclick="archiveSession()">📦 Archive</button>
            <button class="btn-danger" onclick="closeSession()"><img src="/static/icons/close.svg" alt="close"> Close</button>
        </div>
    </div>

    <div class="layout">
        <div class="chat-area">
            <div class="messages" id="messages">
                <div class="msg system"><div class="bubble">Session started. Send a message to begin.</div></div>
            </div>
            <div class="input-wrapper">
                <div class="agent-chips" id="agent-chips"></div>
                <div class="mention-dropdown" id="mention-dropdown"></div>
                <div class="input-area">
                    <input type="text" id="msg-input"
                        placeholder="发消息给主持人，或用 @AgentName 指定..."
                        onkeydown="handleInputKeydown(event)"
                        oninput="handleMentionInput(event)">
                    <button id="action-btn" class="send-mode" onclick="sendMessage()"><img src="/static/icons/send.svg" alt="send" style="width:18px;height:18px;filter:brightness(0) invert(1);"> Send</button>
                </div>
            </div>
        </div>
        <div class="resize-handle" id="resize-handle"></div>
        <div class="sidebar" id="sidebar">
            <h3 style="display:flex;justify-content:space-between;align-items:center;">
                <span>🤖 Agents</span>
                <span id="default-agent-badge" style="font-size:11px;background:#f7cd67;color:#725d42;padding:2px 8px;border-radius:8px;font-weight:600;display:none;cursor:pointer;" title="Click to change 主持人" onclick="promptChangeDefaultAgent()"></span>
            </h3>
            <div id="agent-list-sidebar">Loading...</div>

            <div class="add-agent-form" style="display:none;" id="add-agent-form">
                <select id="new-agent-provider" onchange="updateAddModel()">
                    <option value="">Select Provider</option>
                </select>
                <div id="new-agent-model-wrap"><input type="text" id="new-agent-model" placeholder="Model (e.g. deepseek-chat)" style="width:100%;padding:6px 10px;border:1px solid var(--animal-border-color);border-radius:10px;font-size:12px;background:#fff;box-sizing:border-box;"></div>
                <input type="text" id="new-agent-name" placeholder="Agent Name (e.g. dp2)">
                <input type="text" id="new-agent-role" placeholder="Role (e.g. 测试员)">
                <button onclick="addAgent()"><img src="/static/icons/add.svg" alt="add" style="width:14px;height:14px;filter:brightness(0) invert(1);vertical-align:middle;"> Add Agent</button>
            </div>
            <button class="add-agent-btn" style="width:100%;margin-top:8px;background:none;border:1px dashed var(--animal-border-color);color:var(--animal-text-color-secondary);padding:6px;border-radius:10px;font-size:12px;cursor:pointer;" onclick="toggleAddAgent()"><img src="/static/icons/add.svg" alt="add" style="width:14px;height:14px;vertical-align:middle;"> Add Agent</button>

            <div class="strategy-box" style="margin-top:12px;">
                <h3 style="margin:0 0 8px;font-size:13px;display:flex;justify-content:space-between;align-items:center;">
                    <span>📝 Strategy</span>
                    <div style="display:flex;gap:4px;align-items:center;">
                        <button onclick="toggleCustomTemplateForm()" id="btn-add-custom-tmpl" style="background:none;border:1px dashed var(--animal-border-color);color:var(--animal-text-color-secondary);border-radius:8px;font-size:11px;padding:2px 7px;cursor:pointer;" title="添加自定义策略">＋ 自定义</button>
                        <button onclick="refreshStrategy()" style="background:none;border:none;cursor:pointer;font-size:16px;padding:0 2px;" title="Refresh">🔄</button>
                    </div>
                </h3>
                <select class="strategy-select" id="template-select" onchange="onTemplateChange()">
                    <option value="">— Select template —</option>
                </select>
                <div id="custom-tmpl-delete-row" style="display:none;margin-bottom:6px;">
                    <button onclick="deleteCustomTemplate()" style="width:100%;padding:5px;background:none;border:1px solid #e8baba;color:#c05050;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;">🗑 删除此自定义策略</button>
                </div>
                <div id="role-mapping-area"></div>
                <button class="apply-strategy-btn" onclick="applyStrategy()">✅ Apply Strategy</button>
                <!-- ── Custom template creation form ── -->
                <div id="custom-template-form" style="display:none;margin-top:10px;border-top:1px dashed #d4c8a0;padding-top:10px;">
                    <div style="font-size:11px;font-weight:700;color:#b0a090;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;">新建策略</div>
                    <input type="text" id="ctf-name" placeholder="策略名称" style="width:100%;padding:6px 10px;border:1px solid var(--animal-border-color);border-radius:10px;font-size:12px;background:#fff;box-sizing:border-box;margin-bottom:8px;">
                    <div id="ctf-steps" style="display:flex;flex-direction:column;gap:6px;"></div>
                    <button onclick="addCtfStep()" style="width:100%;margin-top:6px;padding:5px;background:none;border:1px dashed var(--animal-border-color);color:var(--animal-text-color-secondary);border-radius:8px;font-size:12px;cursor:pointer;">＋ 添加步骤</button>
                    <!-- Scope toggle -->
                    <div style="display:flex;gap:0;margin-top:10px;border:1.5px solid var(--animal-border-color);border-radius:10px;overflow:hidden;font-size:12px;">
                        <label style="flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:6px;cursor:pointer;background:#fff;">
                            <input type="radio" name="ctf-scope" value="session" checked style="accent-color:var(--animal-primary-color);"> 本 Session
                        </label>
                        <label style="flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:6px;cursor:pointer;background:#fff;border-left:1.5px solid var(--animal-border-color);">
                            <input type="radio" name="ctf-scope" value="system" style="accent-color:var(--animal-primary-color);"> 系统模板
                        </label>
                    </div>
                    <div style="display:flex;gap:6px;margin-top:8px;">
                        <button onclick="toggleCustomTemplateForm()" style="flex:1;padding:6px;background:none;border:1.5px solid var(--animal-border-color);color:var(--animal-text-color);border-radius:8px;font-size:12px;cursor:pointer;">取消</button>
                        <button onclick="saveCustomTemplate()" style="flex:2;padding:6px;background:var(--animal-primary-color);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;">💾 保存策略</button>
                    </div>
                </div>
                <pre id="strategy-content" style="margin-top:8px;border-top:1px dashed #d4c8a0;padding-top:8px;">(No strategy yet)</pre>
            </div>

            <div class="strategy-box" style="margin-top:12px;">
                <h3 style="margin:0 0 8px;font-size:13px;">🔒 Permissions</h3>
                <div id="permissions-area">Loading...</div>
            </div>

            <div id="approval-area"></div>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <!-- ── Agent edit modal ───────────────────────────────────────────── -->
    <div class="agent-modal-overlay hidden" id="agent-modal-overlay" onclick="if(event.target===this)closeAgentModal()">
        <div class="agent-modal">
            <div class="agent-modal-header">
                <div class="agent-avatar" id="modal-avatar">??</div>
                <div class="agent-modal-title">
                    <h3 id="modal-agent-name">Agent</h3>
                    <span class="role-badge" id="modal-role-badge">—</span>
                </div>
                <button class="modal-close-btn" onclick="closeAgentModal()">✕</button>
            </div>
            <div class="agent-modal-body">
                <!-- Identity -->
                <div class="modal-section">
                    <div class="modal-section-title">Identity</div>
                    <div class="modal-row">
                        <div class="modal-field">
                            <label>Instance Name</label>
                            <input type="text" id="modal-name" readonly>
                        </div>
                        <div class="modal-field">
                            <label>Role</label>
                            <input type="text" id="modal-role" placeholder="e.g. 主持人">
                        </div>
                    </div>
                </div>
                <!-- Model -->
                <div class="modal-section">
                    <div class="modal-section-title">Model</div>
                    <div class="modal-row">
                        <div class="modal-field">
                            <label>Provider</label>
                            <select id="modal-provider" onchange="onModalProviderChange()"></select>
                        </div>
                        <div class="modal-field">
                            <label>Model</label>
                            <div id="modal-model-wrap"></div>
                        </div>
                    </div>
                </div>
                <!-- Soul -->
                <div class="modal-section">
                    <div class="modal-section-title">
                        <span>Soul / System Prompt</span>
                        <span id="modal-soul-count" style="font-weight:400;font-size:10px;color:#c0b0a0;"></span>
                    </div>
                    <div class="modal-field">
                        <textarea id="modal-soul" rows="6"
                            placeholder="描述该 Agent 的人格、职责和行为准则..."
                            oninput="const n=this.value.length;document.getElementById('modal-soul-count').textContent=n?n+' chars':'';"></textarea>
                    </div>
                </div>
            </div>
            <div class="agent-modal-footer">
                <button class="modal-btn secondary" onclick="closeAgentModal()">Cancel</button>
                <button class="modal-btn primary" onclick="saveAgentModal()">Save</button>
            </div>
        </div>
    </div>

    <script>
    const sid = "{{ session_id }}";
    const msgContainer = document.getElementById("messages");
    const strategyEl = document.getElementById("strategy-content");
    let providerModels = {};
    let sessionStatus = "active";
    let editingAgent = null;
    let agentsWorking = false;
    let allTemplates = [];       // [{id, name, steps:[{agent_role,action},...]}]
    let sessionAgentNames = [];  // agent instance names in this session
    let currentDefaultAgent = null;  // 主持人 agent name

    // Configure marked.js (loaded from CDN in <head>)
    if (typeof marked !== 'undefined') {
        marked.setOptions({ breaks: true, gfm: true });
    }

    function escapeAttr(s) {
        return String(s)
            .replace(/\\/g, '\\\\')
            .replace(/\r/g, '\\r')
            .replace(/\n/g, '\\n')
            .replace(/'/g, "\\'");
    }

    // --- Toast ---
    function showToast(msg, type='info') {
        const c = document.getElementById("toast-container");
        const t = document.createElement("div");
        t.className = `toast toast-${type}`;
        t.textContent = msg;
        c.appendChild(t);
        setTimeout(() => { t.style.opacity='0'; t.style.transition='opacity .3s'; setTimeout(()=>t.remove(),300); }, 3000);
    }

    // --- Load Config (providers + models) ---
    async function loadProviderModels() {
        try {
            const r = await fetch("/api/config/agents");
            const data = await r.json();
            const agents = data.agents || {};
            providerModels = {};
            for (const [k, v] of Object.entries(agents)) {
                providerModels[k] = { display_name: v.display_name || k, models: v.models || [], default_model: v.default_model || "" };
            }
            populateProviderDropdowns();
        } catch(e) { providerModels = {}; }
    }

    function populateProviderDropdowns() {
        const providers = Object.keys(providerModels);
        if (!providers.length) {
            providers.push("deepseek","openai");
            providerModels = {deepseek:{models:[],default_model:""},openai:{models:[],default_model:""}};
        }
        const sel1 = document.getElementById("new-agent-provider");
        sel1.innerHTML = '<option value="">Select Provider</option>' + providers.map(p => `<option value="${p}">${providerModels[p]?.display_name || p}</option>`).join("");

        document.querySelectorAll(".agent-edit-provider").forEach(s => {
            const cur = s.value;
            s.innerHTML = providers.map(p => `<option value="${p}" ${p===cur?'selected':''}>${providerModels[p]?.display_name || p}</option>`).join("");
        });
    }

    function updateAddModel() {
        const provider = document.getElementById("new-agent-provider").value;
        const wrap = document.getElementById("new-agent-model-wrap");
        const models = providerModels[provider]?.models || [];
        const defModel = providerModels[provider]?.default_model || "";
        const inputStyle = 'width:100%;padding:6px 10px;border:1px solid var(--animal-border-color);border-radius:10px;font-size:12px;background:#fff;box-sizing:border-box;';
        if (models.length) {
            // Known model list → select dropdown
            const opts = models.map(m => `<option value="${m}">${m}</option>`).join("");
            wrap.innerHTML = `<select id="new-agent-model" style="${inputStyle}">${opts}</select>`;
        } else {
            // No list → free-text input pre-filled with default model if available
            wrap.innerHTML = `<input type="text" id="new-agent-model" value="${defModel}" placeholder="Model (e.g. deepseek-chat)" style="${inputStyle}">`;
        }
    }

    // --- Load Status ---
    async function loadStatus() {
        try {
            const resp = await fetch(`/api/sessions/${sid}`);
            if (resp.ok) {
                const data = await resp.json();
                sessionStatus = data.status || "active";
                document.getElementById("session-status").textContent =
                    sessionStatus === "paused" ? "(Paused)" : sessionStatus === "closed" ? "(Closed)" : "";
                updatePauseResumeBtn(sessionStatus);
                document.getElementById("header-title").textContent =
                    `Session: ${data.name || sid}`;

                if (sessionStatus === "closed") {
                    document.getElementById("msg-input").disabled = true;
                    document.getElementById("action-btn").disabled = true;
                }

                const roles = data.agent_roles || {};
                const configs = data.agent_configs || [];
                renderAgentList(roles, configs);

                // Show 主持人 badge
                if (data.default_agent) {
                    currentDefaultAgent = data.default_agent;
                    updateDefaultAgentBadge(data.default_agent);
                    // Update input placeholder with actual default agent name
                    document.getElementById("msg-input").placeholder =
                        `发消息给 ${data.default_agent}，或用 @AgentName 指定...`;
                }
            }
        } catch(e) {
            console.error("Failed to load session status:", e);
        }
    }

    function updateDefaultAgentBadge(agentName) {
        const badge = document.getElementById("default-agent-badge");
        if (agentName) {
            badge.textContent = `主持人: ${agentName}`;
            badge.style.display = "inline-block";
        } else {
            badge.style.display = "none";
        }
    }

    // ── Agent chips ──────────────────────────────────────────────────────────

    function renderAgentChips(agentNames) {
        const row = document.getElementById("agent-chips");
        if (!agentNames || agentNames.length === 0) { row.style.display = "none"; return; }
        row.style.display = "flex";
        row.innerHTML = agentNames.map(name => {
            const isHost = name.toLowerCase() === (currentDefaultAgent || "").toLowerCase();
            return `<span class="agent-chip${isHost ? " is-host" : ""}" onclick="insertMention('${escapeAttr(name)}')" title="点击插入 @${name}">@${name}</span>`;
        }).join("");
    }

    function insertMention(agentName) {
        const inp = document.getElementById("msg-input");
        const pos = inp.selectionStart;
        const before = inp.value.substring(0, pos);
        const after = inp.value.substring(pos);
        // Ensure space before @ if needed
        const prefix = before.length > 0 && !before.endsWith(" ") ? " " : "";
        const insert = `${prefix}@${agentName} `;
        inp.value = before + insert + after;
        const newPos = pos + insert.length;
        inp.setSelectionRange(newPos, newPos);
        inp.focus();
        hideMentionDropdown();
    }

    // ── @ mention autocomplete ────────────────────────────────────────────────

    let mentionAtPos = -1;     // char index of the @ that triggered the dropdown
    let mentionSelIdx = -1;    // keyboard-selected index in dropdown

    function handleMentionInput(e) {
        const inp = e.target;
        const val = inp.value;
        const pos = inp.selectionStart;
        const before = val.substring(0, pos);
        const m = before.match(/@(\w*)$/);  // @word right before cursor
        if (m) {
            mentionAtPos = before.lastIndexOf("@");
            const query = m[1].toLowerCase();
            const filtered = sessionAgentNames.filter(n => n.toLowerCase().startsWith(query));
            if (filtered.length) { showMentionDropdown(filtered); return; }
        }
        hideMentionDropdown();
    }

    function showMentionDropdown(agents) {
        const dd = document.getElementById("mention-dropdown");
        mentionSelIdx = -1;
        dd.innerHTML = agents.map((name, i) =>
            `<div class="mention-option" data-name="${escapeAttr(name)}" data-idx="${i}" onmousedown="event.preventDefault();selectMention('${escapeAttr(name)}')">
                <span class="chip-dot"></span>${name}
             </div>`
        ).join("");
        dd.style.display = "block";
    }

    function hideMentionDropdown() {
        document.getElementById("mention-dropdown").style.display = "none";
        mentionAtPos = -1;
        mentionSelIdx = -1;
    }

    function selectMention(name) {
        const inp = document.getElementById("msg-input");
        if (mentionAtPos < 0) { insertMention(name); return; }
        const after = inp.value.substring(inp.selectionStart);
        inp.value = inp.value.substring(0, mentionAtPos) + `@${name} ` + after;
        const newPos = mentionAtPos + name.length + 2;
        inp.setSelectionRange(newPos, newPos);
        hideMentionDropdown();
        inp.focus();
    }

    function handleInputKeydown(e) {
        const dd = document.getElementById("mention-dropdown");
        const visible = dd.style.display !== "none";
        if (visible) {
            const opts = dd.querySelectorAll(".mention-option");
            if (e.key === "ArrowDown") {
                e.preventDefault();
                mentionSelIdx = Math.min(mentionSelIdx + 1, opts.length - 1);
                opts.forEach((o, i) => o.classList.toggle("selected", i === mentionSelIdx));
                return;
            }
            if (e.key === "ArrowUp") {
                e.preventDefault();
                mentionSelIdx = Math.max(mentionSelIdx - 1, 0);
                opts.forEach((o, i) => o.classList.toggle("selected", i === mentionSelIdx));
                return;
            }
            if (e.key === "Enter" || e.key === "Tab") {
                if (mentionSelIdx >= 0 && opts[mentionSelIdx]) {
                    e.preventDefault();
                    selectMention(opts[mentionSelIdx].dataset.name);
                    return;
                }
            }
            if (e.key === "Escape") { hideMentionDropdown(); return; }
        }
        if (e.key === "Enter") sendMessage();
    }

    // Close dropdown when clicking outside
    document.addEventListener("click", (e) => {
        if (!e.target.closest("#mention-dropdown") && !e.target.closest("#msg-input")) {
            hideMentionDropdown();
        }
    });

    async function promptChangeDefaultAgent() {
        const options = sessionAgentNames.join(", ");
        const input = prompt(`更改主持人（当前: ${currentDefaultAgent}）\n可选: ${options}`, currentDefaultAgent || "");
        if (!input || input === currentDefaultAgent) return;
        const r = await fetch(`/api/sessions/${sid}/default-agent`, {
            method: "PATCH",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({agent_name: input.trim().toLowerCase()})
        });
        if (r.ok) {
            const d = await r.json();
            currentDefaultAgent = d.default_agent;
            updateDefaultAgentBadge(d.default_agent);
            renderAgentChips(sessionAgentNames);  // update is-host chip highlight
            document.getElementById("msg-input").placeholder = `发消息给 ${d.default_agent}，或用 @AgentName 指定...`;
            showToast(`主持人已切换为 ${d.default_agent}`, "success");
        } else {
            const e = await r.json();
            showToast(e.detail || "Change failed", "error");
        }
    }

    function renderAgentList(agentRoles, agentConfigs) {
        // keep sessionAgentNames in sync so role-mapping dropdowns have current options
        sessionAgentNames = Object.values(agentRoles);
        const al = document.getElementById("agent-list-sidebar");
        if (Object.keys(agentRoles).length === 0) {
            al.innerHTML = '<div style="text-align:center;color:var(--animal-text-color-secondary);font-size:13px;">No agents</div>';
            renderAgentChips(sessionAgentNames);
            return;
        }
        al.innerHTML = Object.entries(agentRoles).map(([role, name]) => {
            const ac = agentConfigs.find(a => a.name === name) || {};
            const provider = ac.provider || "?";
            const model = ac.model || "default";
            const soulSet = !!(ac.system_prompt);
            const statusClass = sessionStatus === "paused" ? "status-paused" : "status-active";
            return `<div class="agent-item" onclick="openAgentEdit('${escapeAttr(name)}','${escapeAttr(role)}','${escapeAttr(provider)}','${escapeAttr(model||'')}','${escapeAttr(ac.system_prompt||'')}')" title="Click to edit">
                <div class="agent-info">
                    <span class="status ${statusClass}"></span>
                    ${name.toLowerCase() === (currentDefaultAgent||'').toLowerCase() ? '<span title="主持人 (default agent)" style="font-size:12px;">👑</span>' : ''}
                    <span>${role}</span>
                    <span style="color:var(--animal-text-color-secondary);font-size:11px;">(${name} | ${provider}${model ? ':'+model.split('/').pop() : ''})</span>
                    ${soulSet ? '<span title="System prompt set" style="font-size:10px;opacity:0.55;margin-left:2px;">💬</span>' : ''}
                </div>
                <button class="del-btn" title="Remove ${name}" onclick="event.stopPropagation();removeAgent('${name}')"><img src="/static/icons/close.svg" alt="remove"></button>
            </div>`;
        }).join("");
        renderAgentChips(sessionAgentNames);
    }

    // ── Agent modal helpers ──────────────────────────────────────────────────

    function _renderModalModel(provider, currentModel) {
        const wrap = document.getElementById("modal-model-wrap");
        const models = providerModels[provider]?.models || [];
        const defModel = providerModels[provider]?.default_model || "";
        if (models.length) {
            const sel = document.createElement("select");
            sel.id = "modal-model";
            models.forEach(m => {
                const o = document.createElement("option");
                o.value = m; o.textContent = m;
                if (m === currentModel) o.selected = true;
                sel.appendChild(o);
            });
            // If currentModel isn't in the list, add it as first option
            if (currentModel && !models.includes(currentModel)) {
                const o = document.createElement("option");
                o.value = currentModel; o.textContent = currentModel; o.selected = true;
                sel.insertBefore(o, sel.firstChild);
            }
            wrap.replaceChildren(sel);
        } else {
            wrap.innerHTML = `<input type="text" id="modal-model" value="${currentModel || defModel}" placeholder="e.g. deepseek-v4-pro" style="padding:8px 12px;border:1.5px solid var(--animal-border-color);border-radius:10px;font-size:13px;background:#faf8f2;width:100%;box-sizing:border-box;">`;
        }
    }

    function onModalProviderChange() {
        const provider = document.getElementById("modal-provider").value;
        _renderModalModel(provider, "");
    }

    function openAgentEdit(name, role, provider, model, systemPrompt) {
        editingAgent = name;
        // Header
        const initials = name.length >= 2 ? name.substring(0,2).toUpperCase() : name.toUpperCase();
        document.getElementById("modal-avatar").textContent = initials;
        document.getElementById("modal-agent-name").textContent = name;
        document.getElementById("modal-role-badge").textContent = role || "—";
        // Identity
        document.getElementById("modal-name").value = name;
        document.getElementById("modal-role").value = role || "";
        // Provider
        const provSel = document.getElementById("modal-provider");
        provSel.innerHTML = Object.keys(providerModels).map(p =>
            `<option value="${p}" ${p===provider?'selected':''}>${providerModels[p]?.display_name || p}</option>`
        ).join("");
        // Model
        _renderModalModel(provider, model);
        // Soul
        const soulEl = document.getElementById("modal-soul");
        soulEl.value = systemPrompt || "";
        const n = soulEl.value.length;
        document.getElementById("modal-soul-count").textContent = n ? n + " chars" : "";
        // Show
        document.getElementById("agent-modal-overlay").classList.remove("hidden");
        setTimeout(() => document.getElementById("modal-role").focus(), 80);
    }

    function closeAgentModal() {
        document.getElementById("agent-modal-overlay").classList.add("hidden");
        editingAgent = null;
    }

    async function saveAgentModal() {
        const name = editingAgent;
        if (!name) return;
        const role = document.getElementById("modal-role").value.trim();
        const provider = document.getElementById("modal-provider").value;
        const modelEl = document.getElementById("modal-model");
        const model = modelEl ? modelEl.value.trim() || null : null;
        const system_prompt = document.getElementById("modal-soul").value.trim() || null;
        if (!role) { showToast("Role is required", "error"); return; }
        const btn = document.querySelector("#agent-modal-overlay .modal-btn.primary");
        if (btn) { btn.textContent = "Saving…"; btn.disabled = true; }
        const resp = await fetch(`/api/sessions/${sid}/agents/${encodeURIComponent(name)}`, {
            method: "PATCH",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({role, provider, model, system_prompt})
        });
        if (btn) { btn.textContent = "Save"; btn.disabled = false; }
        if (resp.ok) {
            showToast(`Agent "${name}" updated`, "success");
            closeAgentModal();
            loadStatus();
        } else {
            const e = await resp.json().catch(() => ({}));
            showToast(e.detail || "Update failed", "error");
        }
    }

    async function removeAgent(name) {
        if (!confirm(`Remove agent "${name}" from this session?`)) return;
        const resp = await fetch(`/api/sessions/${sid}/agents/${encodeURIComponent(name)}`, {method:"DELETE"});
        if (resp.ok) {
            appendMessage("system", `Agent ${name} removed.`);
            loadStatus();
        } else {
            const err = await resp.json();
            showToast(err.detail||"Failed","error");
        }
    }

    function toggleAddAgent() {
        const form = document.getElementById("add-agent-form");
        form.style.display = form.style.display === "none" ? "block" : "none";
        if (form.style.display === "block") populateProviderDropdowns();
    }

    async function addAgent() {
        const name = document.getElementById("new-agent-name").value.trim();
        const provider = document.getElementById("new-agent-provider").value;
        const role = document.getElementById("new-agent-role").value.trim();
        const model = document.getElementById("new-agent-model").value || null;
        if (!name || !role || !provider) { showToast("Please fill all fields","error"); return; }
        const resp = await fetch(`/api/sessions/${sid}/agents`, {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({name, provider, role, model})
        });
        if (resp.ok) {
            appendMessage("system", `Agent ${name} (${role}) added.`);
            document.getElementById("new-agent-name").value = "";
            document.getElementById("new-agent-role").value = "";
            document.getElementById("add-agent-form").style.display = "none";
            loadStatus();
        } else {
            const err = await resp.json();
            showToast(err.detail||"Failed to add agent","error");
        }
    }

    // --- Messages ---
    function formatTime(isoStr) {
        if (!isoStr) return "";
        try { return new Date(isoStr).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}); }
        catch(e) { return ""; }
    }

    function appendMessage(role, content, sender, ts) {
        const d = document.createElement("div");
        d.className = `msg ${role}`;
        const senderHtml = sender && role !== "user"
            ? `<div class="sender">${sender}</div>` : "";
        const copyBtn = role !== "system"
            ? `<button class="copy-btn" onclick="copyMsg(this)" title="复制"><img src="/static/icons/content_copy.svg"></button>` : "";
        const tsText = ts ? `<span class="ts">${formatTime(ts)}</span>` : "";
        const tsRowHtml = (tsText || copyBtn)
            ? `<div class="ts-row">${tsText}${copyBtn}</div>` : "";
        // Build skeleton — bubble filled below
        d.innerHTML = `${senderHtml}<div class="bubble"></div>${tsRowHtml}`;
        const bubble = d.querySelector('.bubble');
        if ((role === 'host' || role === 'agent') && typeof marked !== 'undefined') {
            // Render as Markdown; keep raw text for copy
            bubble.dataset.raw = content;
            bubble.innerHTML = marked.parse(content);
        } else {
            // Plain text for user / system messages (safe, no XSS risk from own input)
            bubble.textContent = content;
        }
        msgContainer.appendChild(d);
        msgContainer.scrollTop = msgContainer.scrollHeight;
    }

    function copyMsg(btn) {
        const bubble = btn.closest('.msg').querySelector('.bubble');
        // Prefer raw Markdown source; fall back to visible text
        const text = bubble.dataset.raw ?? bubble.textContent;
        navigator.clipboard.writeText(text).then(() => {
            const img = btn.querySelector('img');
            img.src = '/static/icons/done.svg';
            img.style.opacity = '1';
            setTimeout(() => {
                img.src = '/static/icons/content_copy.svg';
                img.style.opacity = '';
            }, 1500);
        });
    }

    function setWorkingState(working) {
        agentsWorking = working;
        const btn = document.getElementById("action-btn");
        if (!btn) return;
        if (working) {
            btn.className = "stop-mode";
            btn.innerHTML = "⏹ Stop";
            btn.onclick = stopAgents;
            btn.disabled = false;
        } else {
            btn.className = "send-mode";
            btn.innerHTML = '<img src="/static/icons/send.svg" alt="send" style="width:18px;height:18px;filter:brightness(0) invert(1);"> Send';
            btn.onclick = sendMessage;
            btn.disabled = false;
        }
    }

    async function stopAgents() {
        try {
            await fetch(`/api/sessions/${sid}/cancel`, { method: "POST" });
        } catch(e) { /* ignore */ }
        // Fallback: reset to send state if no SSE event arrives within 4s
        setTimeout(() => { if (agentsWorking) hideThinking(); }, 4000);
    }

    function showThinking() {
        const existing = document.getElementById("thinking-indicator");
        if (existing) return;
        setWorkingState(true);
        const d = document.createElement("div");
        d.className = "msg system";
        d.id = "thinking-indicator";
        d.innerHTML = `<div class="bubble"><div class="thinking">Agents are thinking <div class="dots"><span></span><span></span><span></span></div></div></div>`;
        msgContainer.appendChild(d);
        msgContainer.scrollTop = msgContainer.scrollHeight;
    }

    function hideThinking() {
        const d = document.getElementById("thinking-indicator");
        if (d) { d.remove(); setWorkingState(false); }
    }

    // --- Load History ---
    async function loadHistory() {
        try {
            const r = await fetch(`/api/sessions/${sid}/history`);
            if (!r.ok) return;
            const data = await r.json();
            const conv = data.conversation || [];
            msgContainer.innerHTML = "";
            if (conv.length) {
                conv.forEach(line => {
                    const m = line.match(/^\[([\d\- :]+)\]\s*\[([^\]]+)\]\s*([\s\S]*)$/);
                    if (m) {
                        const ts = m[1].trim();
                        const sender = m[2].trim();
                        const content = m[3].trim();
                        const isUser = sender.toLowerCase() === "user";
                        appendMessage(isUser ? "user" : "host", content, isUser ? "" : sender.toUpperCase(), ts);
                    }
                });
            } else {
                appendMessage("system", "Session started. Send a message to begin.");
            }
        } catch(e) { appendMessage("system", "Session started. Send a message to begin."); }
    }

    // --- Send Message ---
    async function sendMessage() {
        if (agentsWorking) return;
        const input = document.getElementById("msg-input");
        const text = input.value.trim();
        if (!text) return;
        input.value = "";

        appendMessage("user", text, "", new Date().toISOString());
        showThinking();
        try {
            const resp = await fetch(`/api/sessions/${sid}/messages`, {
                method: "POST",
                headers: {"Content-Type":"application/json"},
                body: JSON.stringify({content: text})
            });
            if (!resp.ok) {
                const err = await resp.json().catch(() => ({}));
                showToast(`发送失败 (${resp.status}): ${err.detail || resp.statusText}`, "error");
                hideThinking();
            }
        } catch(e) {
            showToast("网络错误，消息未发送", "error");
            hideThinking();
        }
    }

    // --- SSE ---
    let evtSource = null;
    let sseReconnectTimer = null;
    function connectSSE() {
        if (evtSource) { evtSource.close(); evtSource = null; }
        if (sseReconnectTimer) { clearTimeout(sseReconnectTimer); sseReconnectTimer = null; }
        evtSource = new EventSource(`/api/sessions/${sid}/events/stream`);
        evtSource.onmessage = (e) => {
            try {
                const msg = JSON.parse(e.data);
                const payload = msg.payload || {};
                const type = payload.type || msg.stream || "";

                if (type === "strategy_ready") {
                    hideThinking();
                    appendMessage("system", payload.message || "Strategy generated. Review in sidebar.");
                    strategyEl.textContent = payload.psc || "";
                } else if (type === "reply") {
                    hideThinking();
                    const sender = payload.agent_name ? payload.agent_name.toUpperCase() : "Host";
                    appendMessage("host", payload.content || "Task complete.", sender, msg.timestamp);
                } else if (type === "approval_required") {
                    appendMessage("system", `Approval required: ${payload.context||""}`, "", msg.timestamp);
                    showApproval(payload);
                } else if (type === "progress") {
                    hideThinking();
                    if (payload.message) appendMessage("system", payload.message, "", msg.timestamp);
                } else {
                    hideThinking();
                    if (payload.content) {
                        appendMessage("host", payload.content, "Host", msg.timestamp);
                    }
                }
            } catch(err) {
                console.error("SSE message parse error:", err);
            }
        };
        evtSource.onerror = () => {
            evtSource.close();
            evtSource = null;
            sseReconnectTimer = setTimeout(connectSSE, 3000);
        };
    }

    function showApproval(payload) {
        const area = document.getElementById("approval-area");
        area.innerHTML = `
            <div class="approval-box">
                <strong style="font-size:13px;">⚠ Approval Required</strong>
                <div style="font-size:12px;color:#725d42;margin:4px 0;">${payload.context||""}</div>
                <button class="approve" onclick="approve('${payload.approval_id||''}')">Approve</button>
                <button class="reject" onclick="reject('${payload.approval_id||''}')">Reject</button>
            </div>`;
    }

    // --- Actions ---
    function updatePauseResumeBtn(status) {
        const icon = document.getElementById("btn-pause-resume-icon");
        const label = document.getElementById("btn-pause-resume-label");
        if (status === "paused") {
            icon.src = "/static/icons/play_arrow.svg";
            icon.alt = "resume";
            label.textContent = "Resume";
        } else {
            icon.src = "/static/icons/pause.svg";
            icon.alt = "pause";
            label.textContent = "Pause";
        }
    }

    async function togglePauseResume() {
        if (sessionStatus === "paused") {
            const resp = await fetch(`/api/sessions/${sid}/resume`, {method:"POST"});
            if (resp.ok) {
                sessionStatus = "active";
                document.getElementById("session-status").textContent = "";
                updatePauseResumeBtn("active");
                appendMessage("system","Session resumed");
            } else {
                showToast("Failed to resume session","error");
            }
        } else {
            const resp = await fetch(`/api/sessions/${sid}/pause`, {method:"POST"});
            if (resp.ok) {
                sessionStatus = "paused";
                document.getElementById("session-status").textContent = "(Paused)";
                updatePauseResumeBtn("paused");
                appendMessage("system","Session paused");
            } else {
                showToast("Failed to pause session","error");
            }
        }
    }

    async function closeSession() {
        if (!confirm("Close this session? You will be redirected to Dashboard.")) return;
        await fetch(`/api/sessions/${sid}`, {method:"DELETE"});
        window.location.href="/";
    }

    async function executeStrategy() {
        const btn = document.getElementById("btn-execute");
        btn.classList.add("active-btn");
        btn.textContent = "⏳ Executing...";
        try {
            const resp = await fetch(`/api/sessions/${sid}/execute`, {method:"POST"});
            if (resp.ok) {
                appendMessage("system","Executing strategy...");
            } else {
                const err = await resp.json();
                showToast(err.detail || "Execute failed","error");
            }
        } catch(e) { showToast("Execute failed","error"); }
        btn.classList.remove("active-btn");
        btn.innerHTML = '<img src="/static/icons/play_arrow.svg" alt="execute" style="width:16px;height:16px;filter:brightness(0) invert(1);"> Execute';
    }

    async function archiveSession() {
        const remoteType = prompt("Archive destination type:", "local_nas") || "local_nas";
        const remotePath = prompt("Remote path:", "/tmp/blackboard-archive") || "/tmp/blackboard-archive";
        if (!confirm(`Archive this session to ${remoteType}:${remotePath}? Local files will be cleaned up.`)) return;
        try {
            const r = await fetch(`/api/sessions/${sid}/archive`, {
                method: "POST",
                headers: {"Content-Type":"application/json"},
                body: JSON.stringify({remote_type: remoteType, remote_path: remotePath})
            });
            if (r.ok) {
                const d = await r.json();
                showToast(`Session archived: ${d.archive}`, "success");
                appendMessage("system", `Session archived to ${d.archive}`);
            } else {
                const e = await r.json();
                showToast(e.detail||"Archive failed","error");
            }
        } catch(e) { showToast("Archive failed","error"); }
    }

    async function refreshStrategy() {
        try {
            const s = await fetch(`/api/sessions/${sid}/strategy`);
            if (s.ok) {
                const d = await s.json();
                strategyEl.textContent = d.psc;
            } else { strategyEl.textContent = "(No strategy yet)"; }
        } catch(e) { console.error("Failed to refresh strategy:", e); }
    }

    // --- Template dropdown + role mapping ---
    async function loadTemplates() {
        try {
            const r = await fetch(`/api/sessions/${sid}/templates`);
            if (!r.ok) return;
            const data = await r.json();
            allTemplates = data.templates || [];
            const sel = document.getElementById("template-select");
            const prev = sel.value;
            sel.innerHTML = '<option value="">— Select template —</option>';
            // Group: system first, then custom
            const system = allTemplates.filter(t => t.source !== "custom");
            const custom = allTemplates.filter(t => t.source === "custom");
            if (system.length) {
                const grp = document.createElement("optgroup");
                grp.label = "系统模板";
                system.forEach(t => {
                    const o = document.createElement("option");
                    o.value = t.id;
                    o.textContent = t.name;
                    grp.appendChild(o);
                });
                sel.appendChild(grp);
            }
            if (custom.length) {
                const grp = document.createElement("optgroup");
                grp.label = "自定义 (本 session)";
                custom.forEach(t => {
                    const o = document.createElement("option");
                    o.value = t.id;
                    o.textContent = "★ " + t.name;
                    grp.appendChild(o);
                });
                sel.appendChild(grp);
            }
            // Restore previous selection if still present
            if (prev && [...sel.options].some(o => o.value === prev)) sel.value = prev;
        } catch(e) { console.error("Failed to load templates:", e); }
    }

    // ── Custom template form ─────────────────────────────────────────────────

    let _ctfStepIdx = 0;

    function toggleCustomTemplateForm() {
        const form = document.getElementById("custom-template-form");
        const showing = form.style.display !== "none";
        if (showing) {
            form.style.display = "none";
        } else {
            form.style.display = "block";
            document.getElementById("ctf-name").value = "";
            document.getElementById("ctf-steps").innerHTML = "";
            _ctfStepIdx = 0;
            addCtfStep();  // start with one empty step
            document.getElementById("ctf-name").focus();
        }
    }

    function addCtfStep() {
        const container = document.getElementById("ctf-steps");
        const idx = _ctfStepIdx++;
        const row = document.createElement("div");
        row.dataset.stepIdx = idx;
        row.style.cssText = "display:flex;gap:5px;align-items:center;";
        // Agent role: select from session agents, or free-text fallback
        const agentOpts = sessionAgentNames.length
            ? sessionAgentNames.map(n => `<option value="${escapeAttr(n)}">${n}</option>`).join("")
            : '<option value="">agent</option>';
        row.innerHTML = `
            <select style="width:90px;flex-shrink:0;padding:5px 6px;border:1px solid var(--animal-border-color);border-radius:8px;font-size:12px;background:#fff;">
                ${agentOpts}
            </select>
            <input type="text" placeholder="这个 agent 要做什么…" style="flex:1;padding:5px 8px;border:1px solid var(--animal-border-color);border-radius:8px;font-size:12px;">
            <button onclick="this.closest('[data-step-idx]').remove()" style="background:none;border:none;color:#c9a8a8;cursor:pointer;font-size:15px;padding:0 3px;flex-shrink:0;" title="Remove">✕</button>`;
        container.appendChild(row);
    }

    async function saveCustomTemplate() {
        const name = document.getElementById("ctf-name").value.trim();
        if (!name) { showToast("请填写策略名称", "error"); return; }
        const rows = document.querySelectorAll("#ctf-steps [data-step-idx]");
        const steps = [];
        rows.forEach(row => {
            const sel = row.querySelector("select");
            const inp = row.querySelector("input[type=text]");
            const role = sel ? sel.value.trim() : "";
            const action = inp ? inp.value.trim() : "";
            if (role && action) steps.push({agent_role: role, action});
        });
        if (!steps.length) { showToast("至少需要一个有效步骤", "error"); return; }
        const scope = document.querySelector("input[name='ctf-scope']:checked")?.value || "session";
        const url = scope === "system"
            ? `/api/config/templates`
            : `/api/sessions/${sid}/templates`;
        const resp = await fetch(url, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({name, steps}),
        });
        if (resp.ok) {
            const tmpl = await resp.json();
            const label = scope === "system" ? "系统模板" : "本 Session";
            showToast(`策略 "${name}" 已保存至${label}`, "success");
            toggleCustomTemplateForm();
            await loadTemplates();
            // Auto-select the new template
            document.getElementById("template-select").value = tmpl.id;
            onTemplateChange();
        } else {
            const e = await resp.json().catch(() => ({}));
            showToast(e.detail || "保存失败", "error");
        }
    }

    async function deleteCustomTemplate() {
        const sel = document.getElementById("template-select");
        const tmplId = sel.value;
        if (!tmplId) return;
        const tmpl = allTemplates.find(t => t.id === tmplId);
        if (!tmpl || tmpl.source !== "custom") return;
        if (!confirm(`删除自定义策略 "${tmpl.name}"？`)) return;
        const resp = await fetch(`/api/sessions/${sid}/templates/${encodeURIComponent(tmplId)}`, {method: "DELETE"});
        if (resp.ok) {
            showToast("已删除", "success");
            sel.value = "";
            document.getElementById("custom-tmpl-delete-row").style.display = "none";
            document.getElementById("role-mapping-area").innerHTML = "";
            await loadTemplates();
        } else {
            const e = await resp.json().catch(() => ({}));
            showToast(e.detail || "删除失败", "error");
        }
    }

    function onTemplateChange() {
        const sel = document.getElementById("template-select");
        const tmplId = sel.value;
        const area = document.getElementById("role-mapping-area");
        area.innerHTML = "";
        // Show/hide delete button for custom templates
        const delRow = document.getElementById("custom-tmpl-delete-row");
        const tmpl = tmplId ? allTemplates.find(t => t.id === tmplId) : null;
        delRow.style.display = (tmpl && tmpl.source === "custom") ? "block" : "none";
        if (!tmplId || !tmpl) return;
        // collect unique roles from this template
        const roles = [...new Set(tmpl.steps.map(s => s.agent_role).filter(r => r !== "auto"))];
        if (roles.length === 0) return;
        const label = document.createElement("div");
        label.style.cssText = "font-size:11px;color:#725d42;margin-bottom:4px;font-weight:600;";
        label.textContent = "角色分配 Role Assignment";
        area.appendChild(label);
        roles.forEach(role => {
            const row = document.createElement("div");
            row.className = "role-mapping-row";
            const lbl = document.createElement("span");
            lbl.className = "role-label";
            lbl.textContent = role;
            const sel2 = document.createElement("select");
            sel2.dataset.role = role;
            sel2.innerHTML = `<option value="${role}">(same as role)</option>`;
            sessionAgentNames.forEach(name => {
                const o = document.createElement("option");
                o.value = name;
                o.textContent = name;
                sel2.appendChild(o);
            });
            row.appendChild(lbl);
            row.appendChild(sel2);
            area.appendChild(row);
        });
    }

    async function applyStrategy() {
        const sel = document.getElementById("template-select");
        const tmplId = sel.value;
        if (!tmplId) { showToast("Please select a template first", "error"); return; }
        const roleMappings = {};
        document.querySelectorAll("#role-mapping-area select").forEach(s => {
            if (s.dataset.role && s.value) roleMappings[s.dataset.role] = s.value;
        });
        try {
            const r = await fetch(`/api/sessions/${sid}/strategy`, {
                method: "PUT",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({template_id: tmplId, role_mappings: roleMappings})
            });
            if (r.ok) {
                const d = await r.json();
                strategyEl.textContent = d.psc;
                showToast("Strategy applied — click Execute to run", "success");
            } else {
                const e = await r.json();
                showToast(e.detail || "Failed to apply strategy", "error");
            }
        } catch(e) { showToast("Apply failed", "error"); }
    }

    // --- Permissions ---
    async function loadPermissions() {
        try {
            const r = await fetch(`/api/sessions/${sid}`);
            if (!r.ok) return;
            const data = await r.json();
            const perms = data.permissions || {};
            const mode = perms.mode || "whitelist";
            const area = document.getElementById("permissions-area");
            area.innerHTML = `
                <div style="font-size:12px;color:var(--animal-text-color-secondary);margin-bottom:8px;">
                    <select id="perm-mode-select" style="width:100%;padding:6px 10px;border:1px solid var(--animal-border-color);border-radius:10px;font-size:12px;background:#f8f8f0;box-sizing:border-box;">
                        <option value="whitelist" ${mode==='whitelist'?'selected':''}>Whitelist</option>
                        <option value="approval_first" ${mode==='approval_first'?'selected':''}>Approval First</option>
                        <option value="open" ${mode==='open'?'selected':''}>Open</option>
                    </select>
                    <button onclick="savePermissions()" style="margin-top:6px;width:100%;padding:4px;background:var(--animal-primary-color);color:#fff;border:none;border-radius:10px;font-size:11px;font-weight:600;cursor:pointer;">Update Permissions</button>
                </div>`;
        } catch(e) { console.error("Failed to load permissions:", e); }
    }

    async function savePermissions() {
        const mode = document.getElementById("perm-mode-select").value;
        try {
            const r = await fetch(`/api/sessions/${sid}/permissions`, {
                method:"PATCH",
                headers:{"Content-Type":"application/json"},
                body:JSON.stringify({mode})
            });
            if (r.ok) showToast("Permissions updated","success");
        } catch(e) { showToast("Update failed","error"); }
    }

    // Close agent modal on Escape
    document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeAgentModal();
    });

    // --- Sidebar resize ---
    (function() {
        const handle  = document.getElementById("resize-handle");
        const sidebar = document.getElementById("sidebar");
        const MIN_W = 180, MAX_W = 640;
        const saved = parseInt(localStorage.getItem("sidebarWidth"), 10);
        if (saved && saved >= MIN_W && saved <= MAX_W) sidebar.style.width = saved + "px";

        let dragging = false, startX = 0, startW = 0;

        handle.addEventListener("mousedown", (e) => {
            dragging = true;
            startX = e.clientX;
            startW = sidebar.offsetWidth;
            handle.classList.add("dragging");
            document.body.style.cursor = "col-resize";
            document.body.style.userSelect = "none";
            e.preventDefault();
        });
        document.addEventListener("mousemove", (e) => {
            if (!dragging) return;
            // handle is left border of sidebar: moving left → wider sidebar
            const newW = Math.min(MAX_W, Math.max(MIN_W, startW + (startX - e.clientX)));
            sidebar.style.width = newW + "px";
        });
        document.addEventListener("mouseup", () => {
            if (!dragging) return;
            dragging = false;
            handle.classList.remove("dragging");
            document.body.style.cursor = "";
            document.body.style.userSelect = "";
            localStorage.setItem("sidebarWidth", sidebar.offsetWidth);
        });
    })();

    // --- Init ---
    loadProviderModels();
    loadHistory();
    loadStatus();
    loadPermissions();
    loadTemplates();
    refreshStrategy();
    connectSSE();
    </script>
</body>
</html>
